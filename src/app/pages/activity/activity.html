<mat-card>
    <h2>Add Daily Activity</h2>

    <form (ngSubmit)="save()">

        <mat-form-field>
            <input matInput type="date" [(ngModel)]="activity.date" name="date">
        </mat-form-field>

        <mat-form-field>
            <input matInput type="number" placeholder="Exercise Minutes" [(ngModel)]="activity.exercise"
                name="exercise">
        </mat-form-field>

        <mat-form-field>
            <input matInput type="number" placeholder="Water (Liters)" [(ngModel)]="activity.water" name="water">
        </mat-form-field>

        <mat-form-field>
            <input matInput type="number" placeholder="Sleep Hours" [(ngModel)]="activity.sleep" name="sleep">
        </mat-form-field>

        <button mat-raised-button color="primary">
            Save
        </button>

    </form>
</mat-card>
